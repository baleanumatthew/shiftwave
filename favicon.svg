<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Shiftwave favicon">
  <defs>
    <linearGradient id="shiftwave-favicon-stroke" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5f5f5" />
      <stop offset="0.5" stop-color="#b8b8b8" />
      <stop offset="1" stop-color="#6f6f6f" />
    </linearGradient>
    <filter id="shiftwave-favicon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="16" fill="#000000" />
  <rect x="5.5" y="5.5" width="53" height="53" rx="14.5" fill="none" stroke="url(#shiftwave-favicon-stroke)" stroke-opacity="0.55" />

  <path
    d="M14 36C18 36 20 24 24 24S30 40 34 40 38 28 42 28 46 36 50 36"
    fill="none"
    stroke="url(#shiftwave-favicon-stroke)"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-width="5.5"
    filter="url(#shiftwave-favicon-glow)"
  />

  <circle cx="24" cy="24" r="2.5" fill="#f5f5f5" />
  <circle cx="34" cy="40" r="2.5" fill="#b8b8b8" />
  <circle cx="42" cy="28" r="2.5" fill="#8c8c8c" />
</svg>
